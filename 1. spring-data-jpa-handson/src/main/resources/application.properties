# Hands-on 1: Spring Data JPA - Quick Example
# Using H2 in-memory database - no installation required.
# To switch to MySQL later, see application-mysql.properties.example

logging.level.org.springframework=info
logging.level.com.cognizant=debug

logging.level.org.hibernate.SQL=trace
logging.level.org.hibernate.type.descriptor.sql=trace

logging.pattern.console=%d{dd-MM-yy} %d{HH:mm:ss.SSS} %-20.20thread %5p %-25.25logger{25} %25M %4L %m%n

# H2 in-memory database configuration
spring.datasource.url=jdbc:h2:mem:ormlearn;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Let Hibernate create the table from the Country entity automatically
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Auto-run this file to insert seed data on startup
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
